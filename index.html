<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yuki OS</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    overflow:hidden;
}

#topbar{
    position:fixed;
    top:10px;
    left:0;
    width:100%;
    z-index:100;

    display:flex;
    flex-wrap:wrap;
    justify-content:flex-start;

    padding:0 10px;
    box-sizing:border-box;
}

#topbar button{
    background:#222;
    color:white;
    border:1px solid #444;
    border-radius:8px;
    padding:8px 12px;
    margin:2px;
    cursor:pointer;
}

#card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
}

#category{
    font-size:2rem;
    color:#888;
    margin-bottom:30px;
}

#content{
    font-size:3rem;
    line-height:1.5;
    white-space:pre-wrap;
}

#counter{
    position:fixed;
    bottom:20px;
    right:20px;
    color:#666;
}

#bottomBar{
    position:fixed;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
}

#bottomBar button{
    background:#222;
    color:white;
    border:1px solid #444;
    border-radius:8px;
    padding:8px 12px;
    margin:2px;
    cursor:pointer;
}

#bottomBar select{
    background:#222;
    color:white;
    border:1px solid #444;
    border-radius:8px;
    padding:8px 12px;
    margin:2px;
}

.active{
    border:2px solid #4caf50 !important;
}

</style>
</head>

<body>

<div id="topbar"></div>
    
<div id="card">

<div id="category"></div>

<div id="content">
Loading...
</div>

<div id="slideContainer" style="display:none;">
    <iframe
        id="slideFrame"
        src=""
        width="100%"
        height="800"
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

</div>

<div id="counter"></div>

<div id="bottomBar">

<button id="autoBtn">
⏯ Auto
</button>

<button id="randomBtn">
🎲 Random
</button>

<button id="favBtn">
⭐ Save
</button>

<select id="speedSelect">
    <option value="3000">3秒</option>
    <option value="5000" selected>5秒</option>
    <option value="10000">10秒</option>
    <option value="30000">30秒</option>
</select>

</div>

<div id="addForm" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border:1px solid #555;
z-index:1000;
">

<h2>追加</h2>

<select id="newType">
<option value="memo">memo</option>
<option value="quiz">quiz</option>
<option value="slide">slide</option>
</select>

<br><br>

<input id="newCategory"
placeholder="カテゴリ">

<br><br>

<textarea id="newFront"
placeholder="内容"
rows="4"
cols="30"></textarea>

<br><br>

<textarea id="newBack"
placeholder="答え"
rows="2"
cols="30"></textarea>

<br><br>

<input id="newPriority"
type="number"
value="1">

<br><br>

<button onclick="saveCard()">
保存
</button>

<button onclick="closeAddForm()">
閉じる
</button>

</div>

<script>

const sheetId =
"1fFhD0fDbbPV7WOCOFfYAVTqHTg9tcysTXNo2y9qNf_E";

const url =
`https://opensheet.elk.sh/${sheetId}/シート1`;

let allCards = [];
let cards = [];

let current = 0;

let showingAnswer = false;

let autoMode = true;

let randomMode = true;

let autoTime = 5000;

let currentFilter = "all";

let favoriteIds =
JSON.parse(
localStorage.getItem("favorites") || "[]"
);

async function loadData(){

    const res = await fetch(url);

    allCards = await res.json();

    allCards.forEach((card,index)=>{
        card.id = index;
    });

    createCategoryButtons();

    cards = [...allCards];

    if(randomMode){
        shuffle(cards);
    }

    showCard();
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j =
        Math.floor(
            Math.random()*(i+1)
        );

        [array[i],array[j]]
        =
        [array[j],array[i]];
    }
}

function showCard(){

    if(cards.length===0){

        document.getElementById("content").innerText =
        "データなし";

        return;
    }

    const card = cards[current];
    const content =
    document.getElementById("content");

    const slideContainer =
    document.getElementById("slideContainer");

    content.style.display = "block";
    slideContainer.style.display = "none";

    document.getElementById("category").innerText =
    card.category || "";

    if(card.type === "slide"){

    content.style.display = "none";

    slideContainer.style.display = "block";

    document.getElementById("slideFrame").src =
    card.front;

}
else if(card.type === "quiz"){

        if(showingAnswer){

            document.getElementById("content").innerText =
            card.back;

        }else{

            document.getElementById("content").innerText =
            "Q.\n\n" + card.front;

        }

    }else{

        document.getElementById("content").innerText =
        card.front;

    }

    const isFavorite =
    favoriteIds.includes(card.id);

    document.getElementById("favBtn").innerText =
    isFavorite
    ? "⭐ Saved"
    : "⭐ Save";

    document.getElementById("counter").innerText =
    `${current+1}/${cards.length}`;
}

function nextCard(){

    current++;

    if(current >= cards.length){

        current = 0;

    }

    showingAnswer = false;

    showCard();
}

function prevCard(){

    current--;

    if(current < 0){

        current = cards.length - 1;

    }

    showingAnswer = false;

    showCard();
}

function setCategory(category){

    currentFilter = category;

    cards = allCards.filter(card => {

        if(category === "all"){
            return true;
        }

        return card.category === category;

    });

    current = 0;

    showingAnswer = false;

    if(randomMode){

        shuffle(cards);

    }

    showCard();
}

function showFavorites(){

    cards = allCards.filter(card =>
        favoriteIds.includes(card.id)
    );

    current = 0;

    showingAnswer = false;

    showCard();
}

document
.getElementById("favBtn")
.addEventListener("click",()=>{

    const card = cards[current];

    if(favoriteIds.includes(card.id)){

        favoriteIds =
        favoriteIds.filter(
            id => id !== card.id
        );

    }else{

        favoriteIds.push(card.id);

    }

    localStorage.setItem(
        "favorites",
        JSON.stringify(favoriteIds)
    );

    showCard();
});

document
.getElementById("autoBtn")
.addEventListener("click",()=>{

    autoMode = !autoMode;

    document
    .getElementById("autoBtn")
    .classList.toggle(
        "active",
        autoMode
    );

});

document
.getElementById("randomBtn")
.addEventListener("click",()=>{

    randomMode = !randomMode;

    document
    .getElementById("randomBtn")
    .classList.toggle(
        "active",
        randomMode
    );

});

document
.getElementById("speedSelect")
.addEventListener("change",(e)=>{

    autoTime =
    Number(e.target.value);

});

document.addEventListener("click",(e)=>{

    if(
        e.target.tagName === "BUTTON"
    ){
        return;
    }

    const width =
    window.innerWidth;

    if(
        cards[current].type==="quiz"
        &&
        !showingAnswer
    ){

        showingAnswer = true;

        showCard();

        return;
    }

    if(e.clientX < width/2){

        prevCard();

    }else{

        nextCard();

    }

});

function autoLoop(){

    let waitTime = autoTime;

    if(
        cards.length &&
        cards[current].type==="slide"
    ){
        waitTime = autoTime;
    }

    setTimeout(()=>{

        if(autoMode){

            if(cards.length){

                const card =
                cards[current];

                if(
                    card.type==="quiz"
                    &&
                    !showingAnswer
                ){

                    showingAnswer=true;

                    showCard();

                }else{

                    nextCard();

                }

            }
        }

        autoLoop();

    },waitTime);

}

autoLoop();


const GAS_URL =
"https://script.google.com/macros/s/AKfycbxU_hUhqR7vS2LUhRNXnXiAPgaK_Tut604Kumn0T-i4bq2kI4V35C4BiFNPJ0nyIZC13A/exec";

function openAddForm(){

    document
    .getElementById("addForm")
    .style.display="block";
}

function closeAddForm(){

    document
    .getElementById("addForm")
    .style.display="none";
}

async function saveCard(){

    const data = {

        type:
        document
        .getElementById("newType")
        .value,

        category:
        document
        .getElementById("newCategory")
        .value,

        front:
        document
        .getElementById("newFront")
        .value,

        back:
        document
        .getElementById("newBack")
        .value,

        priority:
        document
        .getElementById("newPriority")
        .value
    };

    await fetch(
        GAS_URL,
        {
            method:"POST",
            body:JSON.stringify(data)
        }
    );

    alert("保存しました");

allCards.push({
    ...data,
    id: allCards.length
});

createCategoryButtons();

closeAddForm();

loadData();
}

loadData();

function createCategoryButtons(){

    const topbar =
    document.getElementById("topbar");

    topbar.innerHTML = "";

    topbar.innerHTML += `
    <button onclick="setCategory('all')">
    全部
    </button>
    `;

    const categories =
    [...new Set(
        allCards.map(c=>c.category)
    )];

    categories.forEach(category=>{

        topbar.innerHTML += `
        <button onclick="setCategory('${category}')">
        ${category}
        </button>
        `;
    });

    topbar.innerHTML += `
    <button onclick="showFavorites()">⭐</button>
    <button onclick="openAddForm()">➕</button>
    `;
}

</script>

</body>
</html>
